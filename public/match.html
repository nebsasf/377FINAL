<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillServe | Find Opportunities</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">SkillServe</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="match.html">Find Opportunities</a>
    </nav>
  </header>

  <main class="app-layout">
    <section class="toolbar">
      <div>
        <p class="eyebrow">Find Opportunities</p>
        <h1>Volunteer matches near you</h1>
      </div>
      <label>
        Filter by category
        <select id="categoryFilter">
          <option value="all">All categories</option>
          <option value="Food Support">Food Support</option>
          <option value="Environment">Environment</option>
          <option value="Education">Education</option>
          <option value="Technology">Technology</option>
        </select>
      </label>
    </section>

    <section class="dashboard-grid">
      <div class="map-panel">
        <div id="map"></div>
      </div>
      <div class="chart-panel">
        <canvas id="categoryChart"></canvas>
      </div>
    </section>

    <section>
      <h2>Opportunities</h2>
      <div id="opportunityList" class="card-grid"></div>
    </section>

    <section class="form-section">
      <h2>Join SkillServe</h2>
      <form id="volunteerForm">
        <div class="form-grid">
          <label>First Name<input name="firstName" required></label>
          <label>Last Name<input name="lastName" required></label>
          <label>Email<input name="email" type="email" required></label>
          <label>City<input name="city"></label>
          <label>State<input name="state" maxlength="2" placeholder="MD"></label>
          <label>Skills<input name="skills" required placeholder="Tutoring, food support"></label>
        </div>
        <button class="button" type="submit">Submit Profile</button>
        <p id="formMessage" class="form-message"></p>
      </form>
    </section>
  </main>

  <footer>
    <p>SkillServe | INST377 Final Project</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
